name: banking_ui
description: Banking voice agent GenUI client — A2UI v0.9 over A2A SSE.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.35.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  logging: ^1.3.0

  # HTTP client for direct bank API calls (port 8000)
  http: ^1.2.0

  # State management
  mobx: ^2.4.0
  flutter_mobx: ^2.2.0

  genui:
    path: ../../../../../v843010/Downloads/genui-main/packages/genui
  genui_a2a:
    path: ../../../../../v843010/Downloads/genui-main/packages/genui_a2a
  json_schema_builder:
    path: ../../../../../v843010/Downloads/genui-main/packages/json_schema_builder
  shared_preferences: ^2.3.0

# Force all transitive dependents of genui to use the same local source.
dependency_overrides:
  genui:
    path: ../../../../../v843010/Downloads/genui-main/packages/genui
  a2ui_core:
    path: ../../../../../v843010/Downloads/genui-main/packages/a2ui_core
  genai_primitives:
    path: ../../../../../v843010/Downloads/genui-main/packages/genai_primitives
  json_schema_builder:
    path: ../../../../../v843010/Downloads/genui-main/packages/json_schema_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  mobx_codegen: ^2.6.1

flutter:
  uses-material-design: true
